<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 1200px;
        height: 630px;
        background: #0a0a0a;
        color: #ffffff;
        font-family: 'Space Grotesk', sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 64px 80px;
      }

      /* Subtle fiber optic lines */
      body::before {
        content: '';
        position: absolute;
        top: 38%;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, #8197ff22 50%, transparent 100%);
      }
      body::after {
        content: '';
        position: absolute;
        top: 62%;
        left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, #8eff7115 50%, transparent 100%);
      }

      .top {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8197ff;
      }

      .label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        color: #8197ff;
        text-transform: uppercase;
        letter-spacing: 0.2em;
      }

      .main {
        position: relative;
      }

      h1 {
        font-size: 110px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.04em;
        margin-bottom: 20px;
      }

      .gradient {
        background: linear-gradient(90deg, #8eff71, #8197ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 32px;
        color: #adaaaa;
        font-weight: 400;
        letter-spacing: -0.01em;
      }

      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }

      .tagline {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 26px;
        color: #6b6969;
        margin-top: 16px;
        line-height: 1.4;
      }

      .url {
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        color: #8eff71;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <h1>Sam<br /><span class="gradient">Mosios.</span></h1>
      <p class="subtitle">SRE & Platform Engineer</p>
      <p class="tagline">Infrastructure and processes that scale with your product.</p>
    </div>

    <div class="bottom">
      <span class="url">sammosios.com</span>
    </div>
  </body>
</html>
