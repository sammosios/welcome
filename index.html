    <script>
      // Restore path encoded by 404.html redirect
      ;(function () {
        var q = window.location.search
        if (q && q[1] === '/') {
          var path = q.slice(2).split('&').map(function (s) { return s.replace(/~and~/g, '&') })
          window.history.replaceState(
            null, null,
            path[0] + (path[1] ? '&' + path[1] : '') + window.location.hash
          )
        }
