<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sam Mosios - SRE &amp; Platform Engineer</title>
    <meta name="description" content="Sam Mosios — SRE & Platform Engineer specialising in infrastructure as code, CI/CD, observability, and developer experience for startups and scale-ups." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet"
      />
    </noscript>
    <script>
      // Restore path encoded by 404.html redirect
      ;(function () {
        var q = window.location.search
        if (q && q[1] === '/') {
          var path = q.slice(2).split('&').map(function (s) { return s.replace(/~and~/g, '&') })
          window.history.replaceState(
            null, null,
            path[0] + (path[1] ? '&' + path[1] : '') + window.location.hash
          )
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
